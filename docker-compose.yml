services:
  ld2410-calibrator:
    image: ghcr.io/umarjamilpc/ld2410-companion-app:latest
    container_name: LD2410-COMPANION-APP
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATA_DIR: /app/data
    volumes:
      # Local dev / generic install:
      - ./data:/app/data
      # Unraid example:
      # - /mnt/user/appdata/LD2410-COMPANION-APP/data:/app/data
    restart: unless-stopped
